name: CI

on:
  push:
  pull_request:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint, typecheck, format check
        run: bun run check

      - name: Build CLI
        run: bun run build
